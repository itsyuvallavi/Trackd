<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
    }

    .header {
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e5e5;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: #666;
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
      color: #333;
    }

    input, select, textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #d1d1d1;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #0066cc;
      box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 60px;
    }

    .button-group {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #0066cc;
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: #0052a3;
    }

    .btn-secondary {
      background: #f5f5f5;
      color: #333;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #e5e5e5;
    }

    .status {
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-top: 12px;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }

    .settings-link {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e5e5e5;
      text-align: center;
    }

    .settings-link a {
      color: #0066cc;
      text-decoration: none;
      font-size: 13px;
    }

    .settings-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>💼 Job Tracker</h1>
    <p class="subtitle">Save this job to your tracker</p>
  </div>

  <div id="content">
    <div id="loading" class="loading" style="display: none;">
      Extracting job details...
    </div>

    <form id="jobForm" style="display: none;">
      <div class="form-group">
        <label for="title">Job Title *</label>
        <input type="text" id="title" required>
      </div>

      <div class="form-group">
        <label for="company">Company *</label>
        <input type="text" id="company" required>
      </div>

      <div class="form-group">
        <label for="location">Location</label>
        <input type="text" id="location">
      </div>

      <div class="form-group">
        <label for="salary">Salary</label>
        <input type="text" id="salary" placeholder="$120k - $150k">
      </div>

      <div class="form-group">
        <label for="status">Status</label>
        <select id="status">
          <option value="SAVED">Saved</option>
          <option value="APPLIED">Applied</option>
          <option value="INTERVIEW">Interview</option>
          <option value="OFFER">Offer</option>
        </select>
      </div>

      <div class="form-group">
        <label for="priority">Priority</label>
        <select id="priority">
          <option value="B" selected>Medium</option>
          <option value="A">High</option>
          <option value="C">Low</option>
        </select>
      </div>

      <div class="form-group">
        <label for="notes">Notes</label>
        <textarea id="notes" rows="6"></textarea>
      </div>

      <input type="hidden" id="url">

      <div class="button-group">
        <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
        <button type="submit" class="btn-primary" id="saveBtn">Save Job</button>
      </div>
    </form>

    <div id="status" style="display: none;"></div>
  </div>

  <div class="settings-link">
    <a href="#" id="settingsLink">Settings</a>
  </div>

  <script src="scripts/popup.js"></script>
</body>
</html>
