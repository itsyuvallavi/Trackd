name: Sync Emails Hourly

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:  # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger email sync
        run: |
          curl -X GET "${{ secrets.APP_URL }}/api/cron/sync-emails" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
