<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark rounded square background - fills entire canvas -->
  <rect x="0" y="0" width="512" height="512" rx="90" fill="#282C2D"/>

  <!-- Letter T + graduation cap in cream color -->
  <g transform="translate(128,90)">
    <!-- Graduation cap top (diamond shape) -->
    <path
      d="M128 30L210 72L128 114L46 72L128 30Z"
      fill="#F5EFE4"
    />

    <!-- Cap band/base -->
    <rect x="58" y="102" width="140" height="18" rx="4" fill="#F5EFE4"/>
    
    <!-- Book curve detail under cap -->
    <path
      d="M58 120 Q128 136 198 120"
      stroke="#282C2D"
      stroke-width="5"
      fill="none"
    />

    <!-- Tassel bob -->
    <circle cx="210" cy="72" r="9" fill="#F5EFE4"/>
    
    <!-- Tassel string -->
    <path
      d="M210 81V124"
      stroke="#F5EFE4"
      stroke-width="8"
      stroke-linecap="round"
    />
    
    <!-- Tassel end -->
    <ellipse cx="210" cy="132" rx="12" ry="10" fill="#F5EFE4"/>

    <!-- Top bar of T -->
    <rect x="18" y="114" width="220" height="44" rx="8" fill="#F5EFE4"/>

    <!-- Stem of T -->
    <path
      d="M98 158H158V320C158 330 150 338 140 338H116C106 338 98 330 98 320V158Z"
      fill="#F5EFE4"
    />
  </g>
</svg>
